<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>קטלוג מוצרים PRO</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#0a0a0a;color:#fff;min-height:100vh}
header{background:#1a1a1a;padding:20px;text-align:center;border-bottom:2px solid #ffc107}
header h1{margin:0;font-size:2em;color:#ffc107}
nav{margin-top:10px}
nav a{color:#fff;text-decoration:none;margin:0 15px;font-weight:bold}
nav a:hover{color:#ffc107}
main{max-width:1200px;margin:0 auto;padding:20px}
section{margin:30px 0;padding:20px;background:#1a1a1a;border-radius:8px;border:1px solid #333}
section h2{color:#ffc107;margin-bottom:15px}
.product-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:20px}
.product-card{background:#2a2a2a;padding:15px;border-radius:8px;border:1px solid #444;transition:all 0.3s}
.product-card:hover{border-color:#ffc107;transform:translateY(-5px)}
.product-card h3{color:#ffc107;margin:10px 0}
.product-card p{color:#ccc;font-size:0.9em;margin:5px 0}
.product-price{font-size:1.3em;color:#ffc107;font-weight:bold;margin:10px 0}
button{background:#ffc107;color:#000;border:none;padding:10px 20px;border-radius:5px;cursor:pointer;font-weight:bold;transition:0.3s}
button:hover{background:#ffb300;transform:scale(1.05)}
.cart-items{background:#2a2a2a;padding:15px;border-radius:5px;margin:10px 0;min-height:100px}
.cart-item{display:flex;justify-content:space-between;align-items:center;padding:10px;border-bottom:1px solid #444}
.cart-item:last-child{border-bottom:none}
footer{background:#1a1a1a;text-align:center;padding:20px;border-top:2px solid #333;margin-top:30px;color:#888}
input,textarea{width:100%;padding:10px;margin:5px 0;border:1px solid #444;border-radius:5px;background:#2a2a2a;color:#fff;font-family:Arial,sans-serif}
input:focus,textarea:focus{outline:none;border-color:#ffc107}
h3{margin:15px 0 10px 0}
</style>
</head>
<body>
<header>
<h1>🛒 קטלוג מוצרים PRO</h1>
<nav>
<a href="#products">מוצרים</a>
<a href="#cart">עגלת קניות</a>
<a href="#checkout">הזמנה</a>
</nav>
</header>
<main>
<section id="products">
<h2>מוצרים זמינים</h2>
<div class="product-list" id="product-list">
<div class="product-card">
<h3>מוצר דוגמה 1</h3>
<p>תיאור המוצר שלך כאן</p>
<p class="product-price">₪99.99</p>
<button onclick="addToCart('מוצר 1', 99.99)">הוסף לסל</button>
</div>
<div class="product-card">
<h3>מוצר דוגמה 2</h3>
<p>תיאור המוצר שלך כאן</p>
<p class="product-price">₪149.99</p>
<button onclick="addToCart('מוצר 2', 149.99)">הוסף לסל</button>
</div>
<div class="product-card">
<h3>מוצר דוגמה 3</h3>
<p>תיאור המוצר שלך כאן</p>
<p class="product-price">₪199.99</p>
<button onclick="addToCart('מוצר 3', 199.99)">הוסף לסל</button>
</div>
</div>
</section>
<section id="cart">
<h2>עגלת קניות שלי</h2>
<div class="cart-items" id="cart-items">
<p style="color:#888">העגלה ריקה כרגע</p>
</div>
<h3 id="total">סה"כ: ₪0</h3>
<button onclick="checkout()">המשך לתשלום</button>
</section>
<section id="checkout" style="display:none">
<h2>השלמת הזמנה</h2>
<input type="text" id="name" placeholder="שם מלא" required>
<input type="email" id="email" placeholder="דוא״ל" required>
<input type="tel" id="phone" placeholder="טלפון" required>
<textarea id="notes" placeholder="הערות נוספות (אופציונלי)"></textarea>
<button onclick="submitOrder()">שלח הזמנה</button>
<button onclick="cancelCheckout()" style="background:#666;margin-top:10px">ביטול</button>
</section>
</main>
<footer>
<p>© 2026 קטלוג מוצרים PRO - כל הזכויות שמורות</p>
</footer>
<script>
let cart = [];
let total = 0;

function addToCart(name, price) {
  cart.push({name, price});
  total += price;
  updateCart();
  alert(name + ' נוסף לסל!');
}

function updateCart() {
  let cartHtml = '';
  cart.forEach((item, index) => {
    cartHtml += `<div class="cart-item"><div><strong>${item.name}</strong></div><div>₪${item.price.toFixed(2)}</div><button onclick="removeFromCart(${index})" style="padding:5px 10px">הסר</button></div>`;
  });
  
  if (cart.length === 0) {
    cartHtml = '<p style="color:#888">העגלה ריקה כרגע</p>';
  }
  
  document.getElementById('cart-items').innerHTML = cartHtml;
  document.getElementById('total').textContent = 'סה"כ: ₪' + total.toFixed(2);
}

function removeFromCart(index) {
  total -= cart[index].price;
  cart.splice(index, 1);
  updateCart();
}

function checkout() {
  if (cart.length === 0) {
    alert('העגלה ריקה! אנא בחר מוצרים קודם');
    return;
  }
  document.getElementById('checkout').style.display = 'block';
  document.getElementById('checkout').scrollIntoView();
}

function cancelCheckout() {
  document.getElementById('checkout').style.display = 'none';
}

function submitOrder() {
  const name = document.getElementById('name').value;
  const email = document.getElementById('email').value;
  const phone = document.getElementById('phone').value;
  
  if (!name || !email || !phone) {
    alert('אנא מלא את כל הפרטים הדרושים');
    return;
  }
  
  alert('תודה ' + name + '!\\nההזמנה שלך התקבלה בהצלחה\\nסה"כ לתשלום: ₪' + total.toFixed(2) + '\\nנוצור איתך קשר בהקדם');
  cart = [];
  total = 0;
  updateCart();
  document.getElementById('name').value = '';
  document.getElementById('email').value = '';
  document.getElementById('phone').value = '';
  document.getElementById('notes').value = '';
  document.getElementById('checkout').style.display = 'none';
}
</script>
</body>
</html>
