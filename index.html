<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>אמרי</title>
    <style>
        body { background: #000; color: #fff; font-family: Arial; padding: 20px; }
        h1 { color: #ffc107; text-align: center; }
        .nav { text-align: center; margin: 20px 0; }
        .nav button { background: #ffc107; color: #000; border: none; padding: 10px 20px; margin: 5px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .nav button:hover { background: #ffed4e; }
        .content { margin: 20px 0; padding: 20px; background: #111; border-radius: 4px; min-height: 300px; }
        .hidden { display: none !important; }
        h2 { color: #ffc107; }
        input { padding: 10px; margin: 5px; background: #222; color: #fff; border: 1px solid #ffc107; border-radius: 4px; width: 200px; }
        .btn { background: #ffc107; color: #000; border: none; padding: 10px 20px; margin: 5px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .btn:hover { background: #ffed4e; }
    </style>
</head>
<body>
    <h1>🛒 אמרי מלכת הסקוויש</h1>
    
    <div class="nav">
        <button onclick="goPage('home')">📦 קטלוג</button>
        <button onclick="goPage('admin')">🔐 ניהול</button>
        <button onclick="goPage('cart')">🛒 עגלה</button>
    </div>

    <div id="home" class="content">
        <h2>קטלוג</h2>
        <p>קטלוג המוצרים</p>
    </div>

    <div id="admin" class="content hidden">
        <h2>ניהול</h2>
        <p>הקוד: 5262104</p>
        <input type="password" id="pwd" placeholder="הקוד">
        <button class="btn" onclick="checkPassword()">כניסה</button>
        <p id="msg"></p>
    </div>

    <div id="cart" class="content hidden">
        <h2>עגלה</h2>
        <p>העגלה שלך ריקה</p>
    </div>

    <script>
        function goPage(page) {
            document.getElementById('home').classList.add('hidden');
            document.getElementById('admin').classList.add('hidden');
            document.getElementById('cart').classList.add('hidden');
            document.getElementById(page).classList.remove('hidden');
        }
        
        function checkPassword() {
            var pwd = document.getElementById('pwd').value;
            var msg = document.getElementById('msg');
            if(pwd == '5262104') {
                msg.innerHTML = '✅ התחברת בהצלחה!';
                msg.style.color = '#00ff00';
            } else {
                msg.innerHTML = '❌ קוד שגוי!';
                msg.style.color = '#ff0000';
            }
        }
    </script>
</body>
</html>
