<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>אמרי מלכת הסקוויש</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#000;color:#fff;font-family:Arial;padding:20px}
.header{background:#111;padding:20px;border-bottom:3px solid #ffc107;margin-bottom:20px;text-align:center}h1{color:#ffc107;font-size:2em}
.main-nav{display:flex;gap:15px;justify-content:center;margin:20px 0}.main-nav button{background:#ffc107;color:#000;border:none;padding:15px 30px;border-radius:4px;cursor:pointer;font-weight:bold;font-size:1.1em}
.container{max-width:1200px;margin:0 auto}.catalog-page{display:block}.catalog-page.hidden{display:none}
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:20px;margin:20px 0}
.product-card{background:#222;padding:15px;border-radius:8px;border:1px solid #444}
.product-image{width:100%;height:150px;background:#333;border-radius:4px;margin-bottom:10px;overflow:hidden}
.product-image img{width:100%;height:100%;object-fit:cover}
.product-card h3{color:#ffc107;margin:10px 0}.product-card p{color:#ccc;font-size:0.9em}
.product-price{color:#ffc107;font-size:1.2em;font-weight:bold;margin:10px 0}
.btn{background:#ffc107;color:#000;border:none;padding:10px 15px;border-radius:4px;cursor:pointer;font-weight:bold}.btn:hover{background:#ffb300}.btn-small{padding:8px 12px;width:100%}
.login-page{display:none}.login-page.show{display:flex;justify-content:center;align-items:center;min-height:80vh}
.login-box{background:#222;border:2px solid #ffc107;padding:40px;border-radius:8px;text-align:center;width:100%;max-width:400px}
.login-box h2{color:#ffc107;margin-bottom:20px}.login-box input{width:100%;padding:15px;margin:15px 0;background:#1a1a1a;border:2px solid #444;color:#fff;border-radius:4px}
.login-box button{width:100%;background:#ffc107;color:#000;border:none;padding:15px;border-radius:4px;cursor:pointer;font-weight:bold}
.admin-page{display:none}.admin-page.show{display:block}.admin-tabs{display:flex;gap:10px;margin-bottom:20px}
.tab-btn{background:#ffc107;color:#000;border:none;padding:10px 20px;border-radius:4px;cursor:pointer;font-weight:bold}.tab-btn.inactive{background:#444;color:#fff}
.tab-content{display:none}.tab-content.active{display:block}.form-group{margin:15px 0}label{display:block;color:#ffc107;font-weight:bold}
input,textarea{width:100%;padding:10px;margin:10px 0;background:#222;border:1px solid #444;color:#fff;border-radius:4px}
#image-preview{width:100%;height:150px;background:#333;border-radius:4px;margin:10px 0;display:flex;align-items:center;justify-content:center;color:#888}
#image-preview img{width:100%;height:100%;object-fit:cover}
.product-item{background:#2a2a2a;padding:10px;margin:10px 0;border-radius:4px;display:flex;justify-content:space-between}
.delete-btn{background:#ff4444;color:#fff;padding:5px 10px;border:none;border-radius:4px;cursor:pointer}
.logout-btn{background:#666;color:#fff;padding:10px 20px;border:none;border-radius:4px;margin-top:20px}
.cart-item{background:#2a2a2a;padding:10px;margin:10px 0;border-radius:4px;display:flex;justify-content:space-between}
</style>
</head>
<body>
<div class="header"><h1>🛒 אמרי מלכת הסקוויש</h1></div>
<div class="main-nav"><button onclick="showCatalog()">📦 קטלוג</button><button onclick="showAdmin()">🔐 ניהול</button><button onclick="showCart()">🛒 עגלה</button></div>
<div class="container">
<div id="catalog-page" class="catalog-page"><h2>קטלוג</h2><div id="catalog-products" class="products-grid"></div></div>
<div id="login-page" class="login-page"><div class="login-box"><h2>ניהול</h2><input type="password" id="admin-code" placeholder="קוד" onkeypress="if(event.key==='Enter')checkAdminCode()"><p id="login-error" style="color:#ff4444"></p><button onclick="checkAdminCode()">כניסה</button></div></div>
<div id="admin-page" class="admin-page">
<div class="admin-tabs"><button class="tab-btn" onclick="switchAdminTab('list')">📦 רשימה</button><button class="tab-btn inactive" onclick="switchAdminTab('add')">➕ הוסף</button></div>
<div id="tab-list" class="tab-content active"><h3>מוצרים</h3><div id="admin-products"></div></div>
<div id="tab-add" class="tab-content">
<h3>מוצר חדש</h3>
<div class="form-group"><label>שם</label><input type="text" id="new-name"></div>
<div class="form-group"><label>תיאור</label><textarea id="new-desc" rows="3"></textarea></div>
<div class="form-group"><label>מחיר</label><input type="number" id="new-price" step="0.01"></div>
<div class="form-group"><label>תמונה</label><input type="file" id="new-image" accept="image/*"><div id="image-preview">תצוגה</div></div>
<button class="btn" onclick="addNewProduct()" style="width:100%">הוסף</button>
</div>
<button class="logout-btn" onclick="logout()">התנתק</button>
</div>
<div id="cart-page" class="catalog-page hidden"><h2>עגלה</h2><div id="cart-items"></div><h3>סה"כ: <span id="cart-total">0</span>₪</h3><button class="btn" onclick="checkout()" style="width:100%;padding:15px">הזמנה</button></div>
</div>
<script>
const ADMIN_CODE='5262104';
let products=[];
let cart=[];
let isAdmin=false;

// IndexedDB setup
let db;
const request = indexedDB.open('ShopDB', 1);
request.onerror = () => console.error('DB error');
request.onsuccess = (e) => {
  db = e.target.result;
  loadProductsFromDB();
};
request.onupgradeneeded = (e) => {
  db = e.target.result;
  if(!db.objectStoreNames.contains('products')) {
    db.createObjectStore('products', {keyPath: 'id'});
  }
};

function loadProductsFromDB() {
  const tx = db.transaction('products');
  const store = tx.objectStore('products');
  const allRecords = store.getAll();
  allRecords.onsuccess = () => {
    products = allRecords.result;
    showCatalog();
  };
}

function saveProductsToDB() {
  const tx = db.transaction('products', 'readwrite');
  const store = tx.objectStore('products');
  store.clear();
  products.forEach(p => store.add(p));
}
