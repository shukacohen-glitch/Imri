<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>אמרי</title>
    <style>
        body { background: #000; color: #fff; font-family: Arial; padding: 20px; }
        h1 { color: #ffc107; }
        .btn { background: #ffc107; color: #000; border: none; padding: 10px 20px; margin: 10px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .nav { text-align: center; margin: 20px 0; }
        .content { margin: 20px 0; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <h1>🛒 אמרי מלכת הסקוויש</h1>
    
    <div class="nav">
        <button class="btn" onclick="show('home')">📦 קטלוג</button>
        <button class="btn" onclick="show('admin')">🔐 ניהול</button>
        <button class="btn" onclick="show('cart')">🛒 עגלה</button>
    </div>

    <div id="home" class="content">
        <h2>קטלוג</h2>
        <p>יש כאן מוצרים</p>
    </div>

    <div id="admin" class="content hidden">
        <h2>ניהול</h2>
        <p>יש כאן ניהול</p>
    </div>

    <div id="cart" class="content hidden">
        <h2>עגלה</h2>
        <p>יש כאן עגלה</p>
    </div>

    <script>
        function show(page) {
            document.getElementById('home').classList.add('hidden');
            document.getElementById('admin').classList.add('hidden');
            document.getElementById('cart').classList.add('hidden');
            document.getElementById(page).classList.remove('hidden');
        }
    </script>
</body>
</html>
