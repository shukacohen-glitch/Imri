<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>אמרי</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#000;color:#fff;font-family:Arial;padding:20px}
.header{background:#111;padding:20px;text-align:center;border-bottom:3px solid #ffc107}h1{color:#ffc107}
.nav{display:flex;gap:10px;justify-content:center;margin:20px 0}.nav button{background:#ffc107;color:#000;border:none;padding:15px;cursor:pointer;border-radius:4px}
.hidden{display:none}.products{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:15px;margin:20px 0}
.product{background:#222;padding:15px;border-radius:4px}.product img{width:100%;height:120px;object-fit:cover;border-radius:4px}
.product h3{color:#ffc107;margin:10px 0}.product p{color:#ccc;font-size:0.9em}.price{color:#ffc107;font-weight:bold}.btn{background:#ffc107;color:#000;border:none;padding:10px;width:100%;margin-top:10px;cursor:pointer;border-radius:4px}
.form{background:#222;padding:20px;border-radius:4px;max-width:400px;margin:20px auto}input,textarea{width:100%;padding:10px;margin:10px 0;background:#111;border:1px solid #444;color:#fff;border-radius:4px}
.preview{width:100%;height:120px;background:#333;margin:10px 0;border-radius:4px;display:flex;align-items:center;justify-content:center;color:#888}
.preview img{width:100%;height:100%;object-fit:cover;border-radius:4px}
.list-item{background:#2a2a2a;padding:10px;margin:10px 0;display:flex;justify-content:space-between;border-radius:4px}
.delete{background:#ff4444;color:#fff;border:none;padding:5px 10px;cursor:pointer;border-radius:4px}
.login{background:#222;padding:40px;text-align:center;border-radius:4px;max-width:300px;margin:50px auto}
.login h2{color:#ffc107;margin-bottom:20px}.cart{margin:20px 0}.cart-item{background:#2a2a2a;padding:10px;margin:10px 0;border-radius:4px}
</style>
</head>
<body>
<div class="header"><h1>🛒 אמרי מלכת הסקוויש</h1></div>

<div class="nav">
<button onclick="goTo('catalog')">📦 קטלוג</button>
<button onclick="goTo('admin')">🔐 ניהול</button>
<button onclick="goTo('cart')">🛒 עגלה</button>
</div>

<div id="catalog">
<h2>קטלוג</h2>
<div id="plist" class="products"></div>
</div>

<div id="admin" class="hidden">
<div class="login">
<h2>ניהול</h2>
<input type="password" id="pwd" placeholder="קוד">
<button class="btn" onclick="login()">כניסה</button>
</div>
<div id="adm" class="hidden">
<div class="form">
<h2>הוסף מוצר</h2>
<input type="text" id="pname" placeholder="שם">
<input type="text" id="pdesc" placeholder="תיאור">
<input type="number" id="pprice" placeholder="מחיר" step="0.01">
<input type="file" id="pimg" accept="image/*">
<div class="preview" id="prev">תצוגה</div>
<button class="btn" onclick="save()">שמור</button>
</div>
<h2>המוצרים שלי</h2>
<div id="alist"></div>
<button class="btn" style="background:#666" onclick="goTo('catalog')">חזרה</button>
</div>
</div>

<div id="cart" class="hidden">
<h2>עגלה</h2>
<div id="clist" class="cart"></div>
<h3>סה"כ: ₪<span id="sum">0</span></h3>
<button class="btn" onclick="order()">הזמנה</button>
</div>

<script>
let p=[],c=[],ok=0;
const code='5262104';

window.onload=()=>{
  p=JSON.parse(localStorage.getItem('p'))||[];
  show();
};

document.getElementById('pimg').addEventListener('change',e=>{
  if(e.target.files[0]){
    let r=new FileReader();
    r.onload=x=>document.getElementById('prev').innerHTML='<img src="'+x.target.result+'">';
    r.readAsDataURL(e.target.files[0]);
  }
});

function goTo(x){
  document.getElementById('catalog').classList.add('hidden');
  document.getElementById('admin').classList.add('hidden');
  document.getElementById('cart').classList.add('hidden');
  document.getElementById(x).classList.remove('hidden');
  if(x=='cart') show_cart();
}

function login(){
  if(document.getElementById('pwd').value==code){
    ok=1;
    document.querySelector('.login').classList.add('hidden');
    document.getElementById('adm').classList.remove('hidden');
    show_list();
  }else alert('❌');
}

function save(){
  let n=document.getElementById('pname').value;
  let d=document.getElementById('pdesc').value;
  let pr=document.getElementById('pprice').value;
  let img=document.getElementById('pimg');
  if(!n||!d||!pr||!img.files[0]){alert('מלא הכל');return;}
  let r=new FileReader();
  r.onload=e=>{
    p.push({id:Date.now(),name:n,desc:d,price:parseFloat(pr),img:e.target.result});
    localStorage.setItem('p',JSON.stringify(p));
    document.getElementById('pname').value='';
    document.getElementById('pdesc').value='';
    document.getElementById('pprice').value='';
    document.getElementById('pimg').value='';
    document.getElementById('prev').innerHTML='תצוגה';
    show();
    show_list();
    alert('✅');
  };
  r.readAsDataURL(img.files[0]);
}

function del(id){
  if(confirm('מחק?')){
    p=p.filter(x=>x.id!=id);
    localStorage.setItem('p',JSON.stringify(p));
    show();
    show_list();
  }
}

function show(){
  let h='';
  p.forEach(x=>{
    h+=`<div class="product"><img src="${x.img}" onerror="this.style.display='none'"><h3>${x.name}</h3><p>${x.desc}</p><div class="price">₪${x.price}</div><button class="btn" onclick="add(${x.id},'${x.name}',${x.price})">הוסף</button></div>`;
  });
  document.getElementById('plist').innerHTML=h||'אין';
}

function show_list(){
  let h='';
  p.forEach(x=>{
    h+=`<div class="list-item"><div><b>${x.name}</b> - ₪${x.price}</div><button class="delete" onclick="del(${x.id})">מחק</button></div>`;
  });
  document.getElementById('alist').innerHTML=h||'אין';
}

function add(id,name,price){
  c.push({id,name,price});
  alert('✅');
}

function show_cart(){
  let h='',t=0;
  c.forEach((x,i)=>{
    t+=x.price;
    h+=`<div class="cart-item"><b>${x.name}</b> - ₪${x.price} <button class="delete" onclick="c.splice(${i},1);show_cart()">הסר</button></div>`;
  });
  document.getElementById('clist').innerHTML=h||'ריקה';
  document.getElementById('sum').textContent=t;
}

function order(){
  if(!c.length){alert('ריקה');return;}
  let n=prompt('שם:');
  let ph=prompt('טלפון:');
  if(n&&ph){
    let t=c.reduce((s,x)=>s+x.price,0);
    let m=`*הזמנה*\nשם: ${n}\nטלפון: ${ph}\n---\n`;
    c.forEach(x=>m+=`${x.name} - ₪${x.price}\n`);
    m+=`---\nסה"כ: ₪${t}`;
    let u=`https://wa.me/972533381681?text=${encodeURIComponent(m)}`;
    window.open(u);
    alert('✅');
    c=[];
    goTo('catalog');
  }
}
</script>
</body>
</html>
