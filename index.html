<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אמרי מלכת הסקוויש</title>
</head>
<body>
    <h1>Product Catalog</h1>
    <input type="file" id="imageUpload" accept="image/*" onchange="previewImage(event)">
    <img id="imagePreview" style="display:none;" alt="Image Preview">

    <script>
        function previewImage(event) {
            const imagePreview = document.getElementById('imagePreview');
            const file = event.target.files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                imagePreview.src = e.target.result;
                imagePreview.style.display = 'block';
            }
            reader.readAsDataURL(file);
        }

        function addNewProduct() {
            const fileInput = document.getElementById('imageUpload');
            const file = fileInput.files[0];

                reader.onload = function(e) {
                    // Handle image upload logic (e.g., upload image to server)
                }
                reader.readAsDataURL(file);
            }
        }

        function loadCatalog() {
            // Logic to display products; modify this to display product images as well.
        }
    </script>
</body>
</html>
