<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>אמרי מלכת הסקוויש</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:Arial;padding:20px}
.header{background:#111;padding:20px;border-bottom:3px solid #ffc107;margin-bottom:20px;text-align:center}
h1{color:#ffc107;font-size:2em}
.nav{display:flex;gap:10px;justify-content:center;margin:20px 0}
.nav button{background:#ffc107;color:#000;border:none;padding:15px 30px;border-radius:4px;cursor:pointer;font-weight:bold}
.container{max-width:1200px;margin:0 auto}
.page{display:none}
.page.active{display:block}
.products{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:20px;margin:20px 0}
.card{background:#222;padding:15px;border-radius:8px;border:1px solid #444}
.card h3{color:#ffc107;margin:10px 0}
.card p{color:#ccc;font-size:0.9em}
.price{color:#ffc107;font-weight:bold;font-size:1.2em;margin:10px 0}
.btn{background:#ffc107;color:#000;border:none;padding:10px 15px;border-radius:4px;cursor:pointer;font-weight:bold;width:100%}
.btn-small{padding:8px 12px}
input,textarea{width:100%;padding:10px;margin:10px 0;background:#222;border:1px solid #444;color:#fff;border-radius:4px}
.login-box{background:#222;border:2px solid #ffc107;padding:40px;border-radius:8px;max-width:400px;margin:50px auto;text-align:center}
.login-box h2{color:#ffc107;margin-bottom:20px}
.admin-content{display:none}
.admin-content.show{display:block}
.item{background:#2a2a2a;padding:10px;margin:10px 0;border-radius:4px;display:flex;justify-content:space-between;align-items:center}
.delete-btn{background:#ff4444;color:#fff;padding:5px 10px;border:none;border-radius:4px;cursor:pointer}
.cart-item{background:#2a2a2a;padding:10px;margin:10px 0;border-radius:4px;display:flex;justify-content:space-between}
.checkout-btn{background:#ffc107;color:#000;border:none;padding:15px;border-radius:4px;cursor:pointer;font-weight:bold;width:100%;margin-top:20px}
</style>
</head>
<body>
<div class="header"><h1>🛒 אמרי מלכת הסקוויש</h1></div>

<div class="nav">
<button onclick="showPage('catalog')">📦 קטלוג</button>
<button onclick="showPage('admin')">🔐 ניהול</button>
<button onclick="showPage('cart')">🛒 עגלה</button>
</div>

<div class="container">

<!-- קטלוג -->
<div id="catalog" class="page active">
<h2>קטלוג</h2>
<div id="products" class="products"></div>
</div>

<!-- ניהול -->
<div id="admin" class="page">
<div class="login-box">
<h2>ניהול</h2>
<input type="password" id="code" placeholder="קוד">
<button onclick="checkCode()" class="btn">כניסה</button>
</div>
<div id="admin-content" class="admin-content">
<h2>הוסף מוצר</h2>
<input type="text" id="name" placeholder="שם מוצר">
<input type="text" id="desc" placeholder="תיאור">
<input type="number" id="price" placeholder="מחיר" step="0.01">
<button onclick="addProduct()" class="btn">הוסף</button>
<h3>המוצרים שלי</h3>
<div id="list"></div>
<button onclick="logout()" class="btn" style="background:#666;margin-top:20px">התנתק</button>
</div>
</div>

<!-- עגלה -->
<div id="cart" class="page">
<h2>עגלה</h2>
<div id="cart-items"></div>
<h3>סה"כ: <span id="total">0</span>₪</h3>
<button onclick="checkout()" class="checkout-btn">הזמנה</button>
</div>

</div>

<script>
let products = [];
let cart = [];
let isAdmin = false;
const ADMIN_CODE = '5262104';

// טען מוצרים בעת טעינת הדף
window.addEventListener('load', function() {
  const saved = localStorage.getItem('shop-products');
  if(saved) {
    try {
      products = JSON.parse(saved);
    } catch(e) {}
  }
  renderProducts();
});

function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(page).classList.add('active');
  
  if(page === 'cart') {
    renderCart();
  }
}

function checkCode() {
  const code = document.getElementById('code').value.trim();
  if(code === ADMIN_CODE) {
    isAdmin = true;
    document.getElementById('code').value = '';
    document.querySelector('.login-box').style.display = 'none';
    document.getElementById('admin-content').classList.add('show');
    renderList();
  } else {
    alert('❌ קוד שגוי');
  }
}

function logout() {
  isAdmin = false;
  document.querySelector('.login-box').style.display = 'block';
  document.getElementById('admin-content').classList.remove('show');
  document.getElementById('code').value = '';
}

function addProduct() {
  const name = document.getElementById('name').value.trim();
  const desc = document.getElementById('desc').value.trim();
  const price = parseFloat(document.getElementById('price').value);
  
  if(!name || !desc || !price) {
    alert('מלא הכל');
    return;
  }
  
  products.push({
    id: Date.now(),
    name: name,
    desc: desc,
    price: price
  });
  
  localStorage.setItem('shop-products', JSON.stringify(products));
  
  document.getElementById('name').value = '';
  document.getElementById('desc').value = '';
  document.getElementById('price').value = '';
  
  renderProducts();
  renderList();
  alert('✅ מוצר הוסף');
}

function deleteProduct(id) {
  if(confirm('מחק את המוצר?')) {
    products = products.filter(p => p.id !== id);
    localStorage.setItem('shop-products', JSON.stringify(products));
    renderProducts();
    renderList();
  }
}

function renderProducts() {
  let html = '';
  products.forEach(p => {
    html += `<div class="card">
      <h3>${p.name}</h3>
      <p>${p.desc}</p>
      <div class="price">₪${p.price.toFixed(2)}</div>
      <button onclick="addToCart(${p.id},'${p.name}',${p.price})" class="btn btn-small">הוסף לעגלה</button>
    </div>`;
  });
  document.getElementById('products').innerHTML = html || '<p>אין מוצרים</p>';
}

function renderList() {
  let html = '';
  products.forEach(p => {
    html += `<div class="item">
      <div><strong>${p.name}</strong> - ₪${p.price.toFixed(2)}</div>
      <button onclick="deleteProduct(${p.id})" class="delete-btn">מחק</button>
    </div>`;
  });
  document.getElementById('list').innerHTML = html || '<p>אין מוצרים</p>';
}

function addToCart(id, name, price) {
  cart.push({id, name, price});
  alert('✅ נוסף לעגלה');
}

function renderCart() {
  let html = '';
  let total = 0;
  cart.forEach((item, index) => {
    total += item.price;
    html += `<div class="cart-item">
      <div><strong>${item.name}</strong> - ₪${item.price.toFixed(2)}</div>
      <button onclick="removeFromCart(${index})" class="delete-btn">הסר</button>
    </div>`;
  });
  document.getElementById('cart-items').innerHTML = html || '<p>העגלה ריקה</p>';
  document.getElementById('total').textContent = total.toFixed(2);
}

function removeFromCart(index) {
  cart.splice(index, 1);
  renderCart();
}

function checkout() {
  if(cart.length === 0) {
    alert('העגלה ריקה');
    return;
  }
  
  const name = prompt('שם:');
  const phone = prompt('טלפון:');
  
  if(name && phone) {
    const total = cart.reduce((sum, item) => sum + item.price, 0);
    let msg = `*הזמנה*\nשם: ${name}\nטלפון: ${phone}\n---\n`;
    cart.forEach(item => {
      msg += `${item.name} - ₪${item.price.toFixed(2)}\n`;
    });
    msg += `---\n*סה"כ: ₪${total.toFixed(2)}*`;
    
    const wa = `https://wa.me/972533381681?text=${encodeURIComponent(msg)}`;
    window.open(wa, '_blank');
    
    alert('✅ ההזמנה נשלחה!');
    cart = [];
    showPage('catalog');
  }
}
</script>

</body>
</html>
