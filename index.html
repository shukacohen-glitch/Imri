<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="pimg">Hello World!</p>
    <script>
        // Wrapped in setTimeout 100ms
        window.addEventListener('load', function() {
            setTimeout(() => {
                // Wrapped in setTimeout 200ms
                setTimeout(() => {
                    const pimg = document.getElementById('pimg');
                    if (pimg) {
                        pimg.innerText = 'Image loaded!';
                    }
                }, 200);
            }, 100);
        });
    </script>
</body>
</html>
