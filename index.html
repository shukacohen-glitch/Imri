<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>אמרי</title>
    <style>
        body { background: #000; color: #fff; font-family: Arial; padding: 20px; }
        h1 { color: #ffc107; text-align: center; }
        .nav { text-align: center; margin: 20px 0; }
        .nav button { background: #ffc107; color: #000; border: none; padding: 10px 20px; margin: 5px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .content { margin: 20px 0; padding: 20px; background: #111; border-radius: 4px; min-height: 300px; }
        .hidden { display: none !important; }
        h2 { color: #ffc107; }
        input, textarea { padding: 10px; margin: 10px 0; background: #222; color: #fff; border: 1px solid #ffc107; border-radius: 4px; width: 100%; max-width: 300px; box-sizing: border-box; }
        .btn { background: #ffc107; color: #000; border: none; padding: 10px 20px; margin: 10px 0; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .btn:hover { background: #ffed4e; }
        .login-section { display: block; }
        .login-section.hidden { display: none; }
        .admin-section { display: none; }
        .admin-section.show { display: block; }
    </style>
</head>
<body>
    <h1>🛒 אמרי מלכת הסקוויש</h1>
    
    <div class="nav">
        <button onclick="goPage('home')">📦 קטלוג</button>
        <button onclick="goPage('admin')">🔐 ניהול</button>
        <button onclick="goPage('cart')">🛒 עגלה</button>
    </div>

    <div id="home" class="content">
        <h2>קטלוג</h2>
        <p>קטלוג המוצרים</p>
        <div id="products"></div>
    </div>

    <div id="admin" class="content hidden">
        <h2>ניהול</h2>
        
        <div class="login-section" id="loginSection">
            <p>הקוד: 5262104</p>
            <input type="password" id="pwd" placeholder="הקוד">
            <button class="btn" onclick="loginAdmin()">כניסה</button>
            <p id="msg"></p>
        </div>
        
        <div class="admin-section" id="adminPanel">
            <h3>הוסף מוצר</h3>
            <input type="text" id="productName" placeholder="שם המוצר">
            <input type="text" id="productDesc" placeholder="תיאור">
            <input type="number" id="productPrice" placeholder="מחיר" step="0.01">
            <input type="file" id="productImg" accept="image/*">
            <button class="btn" onclick="addProduct()">הוסף מוצר</button>
            
            <h3>המוצרים שלי</h3>
            <div id="adminProducts"></div>
            
            <button class="btn" onclick="logout()" style="background: #ff4444;">התנתק</button>
        </div>
    </div>

    <div id="cart" class="content hidden">
        <h2>עגלה</h2>
        <p>העגלה שלך ריקה</p>
    </div>

    <script>
        let isLoggedIn = false;
        let products = [];
        
        function goPage(page) {
            document.getElementById('home').classList.add('hidden');
            document.getElementById('admin').classList.add('hidden');
            document.getElementById('cart').classList.add('hidden');
            document.getElementById(page).classList.remove('hidden');
        }
        
        function loginAdmin() {
            var pwd = document.getElementById('pwd').value;
            var msg = document.getElementById('msg');
            if(pwd == '5262104') {
                isLoggedIn = true;
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('adminPanel').classList.add('show');
                msg.innerHTML = '';
            } else {
                msg.innerHTML = '❌ קוד שגוי!';
                msg.style.color = '#ff0000';
            }
        }
        
        function logout() {
            isLoggedIn = false;
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('adminPanel').classList.remove('show');
            document.getElementById('pwd').value = '';
        }
        
        function addProduct() {
            if(!isLoggedIn) {
                alert('צריך להיות מחובר');
                return;
            }
            
            var name = document.getElementById('productName').value;
            var desc = document.getElementById('productDesc').value;
            var price = document.getElementById('productPrice').value;
            var fileInput = document.getElementById('productImg');
            
            if(!name || !desc || !price || !fileInput.files[0]) {
                alert('מלא הכל כולל תמונה');
                return;
            }
            
            var reader = new FileReader();
            reader.onload = function(e) {
                products.push({
                    id: Date.now(),
                    name: name,
                    desc: desc,
                    price: price,
                    img: e.target.result
                });
                
                localStorage.setItem('products', JSON.stringify(products));
                
                document.getElementById('productName').value = '';
                document.getElementById('productDesc').value = '';
                document.getElementById('productPrice').value = '';
                document.getElementById('productImg').value = '';
                
                displayAdminProducts();
                displayProducts();
                alert('✅ מוצר הוסף!');
            };
            reader.readAsDataURL(fileInput.files[0]);
        }
        
        function displayAdminProducts() {
            var html = '';
            products.forEach(function(p) {
                html += '<div style="background: #222; padding: 10px; margin: 10px 0; border-radius: 4px;">';
                html += '<b>' + p.name + '</b> - ₪' + p.price;
                html += ' <button class="btn" onclick="deleteProduct(' + p.id + ')" style="background: #ff4444;">מחק</button>';
                html += '</div>';
            });
            document.getElementById('adminProducts').innerHTML = html || 'אין מוצרים';
        }
        
        function displayProducts() {
            var html = '';
            products.forEach(function(p) {
                html += '<div style="background: #222; padding: 10px; margin: 10px 0; border-radius: 4px;">';
                html += '<b>' + p.name + '</b><br>';
                html += '<img src="' + p.img + '" style="width: 100%; max-width: 200px; border-radius: 4px; margin: 10px 0;">';
                html += '<p>' + p.desc + '</p>';
                html += '<p style="color: #ffc107; font-weight: bold;">₪' + p.price + '</p>';
                html += '<button class="btn" onclick="addToCart(\'' + p.name + '\', ' + p.price + ')">הוסף לעגלה</button>';
                html += '</div>';
            });
            document.getElementById('products').innerHTML = html || 'אין מוצרים';
        }
        
        function deleteProduct(id) {
            products = products.filter(function(p) { return p.id != id; });
            localStorage.setItem('products', JSON.stringify(products));
            displayAdminProducts();
            displayProducts();
        }
        
        function addToCart(name, price) {
            alert('✅ ' + name + ' הוסף לעגלה!');
        }
        
        // Load on startup
        var saved = localStorage.getItem('products');
        if(saved) {
            products = JSON.parse(saved);
        }
        displayProducts();
    </script>
</body>
</html>
