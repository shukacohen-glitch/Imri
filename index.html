<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>אמרי</title>
<style>
body{background:#000;color:#fff;font-family:Arial;padding:20px}h1{color:#ffc107;text-align:center}
.buttons{text-align:center;margin:20px}.buttons button{background:#ffc107;color:#000;border:none;padding:15px;margin:5px;cursor:pointer;border-radius:4px;font-size:16px;font-weight:bold}
.page{background:#222;padding:20px;margin:20px 0;border-radius:4px;min-height:200px;display:none}
.page.active{display:block}
h2{color:#ffc107}input,textarea{width:100%;padding:10px;margin:10px 0;background:#111;color:#fff;border:1px solid #ffc107;box-sizing:border-box}
.btn{background:#ffc107;color:#000;border:none;padding:10px 20px;margin:10px 0;cursor:pointer;font-weight:bold}
.alert{padding:15px;margin:10px 0;border-radius:4px;font-weight:bold}
.success{background:#00aa00;color:#fff}
.error{background:#aa0000;color:#fff}
.product-item{background:#111;padding:15px;margin:10px 0;border-radius:4px;border:2px solid #ffc107}
.product-item img{width:100%;max-width:200px;margin:10px 0;border-radius:4px}
</style>
</head>
<body>
<h1>🛒 אמרי מלכת הסקוויש</h1>

<div class="buttons">
<button onclick="show('home')">📦 קטלוג</button>
<button onclick="show('admin')">🔐 ניהול</button>
<button onclick="show('cart')">🛒 עגלה</button>
</div>

<div id="home" class="page active">
<h2>קטלוג</h2>
<div id="productList">אין מוצרים עדיין</div>
</div>

<div id="admin" class="page">
<h2>ניהול</h2>
<div id="login">
<input type="password" id="code" placeholder="הקוד" onkeypress="if(event.key==='Enter')checkCode()">
<button class="btn" onclick="checkCode()">כניסה</button>
</div>
<div id="panel" style="display:none">
<h3>הוסף מוצר חדש</h3>
<div id="message"></div>
<input type="text" id="name" placeholder="שם המוצר">
<input type="text" id="desc" placeholder="תיאור">
<input type="number" id="price" placeholder="מחיר" step="0.01">
<input type="file" id="img" accept="image/*">
<button class="btn" onclick="addProduct()">שמור מוצר</button>
<h3>המוצרים שלי</h3>
<div id="myProducts"></div>
<button class="btn" onclick="logout()" style="background:#f44">התנתק</button>
</div>
</div>

<div id="cart" class="page">
<h2>עגלה</h2>
<div id="cartList">העגלה ריקה</div>
</div>

<script>
let products = [];
let cart = [];
let isLoggedIn = false;

window.addEventListener('load', function() {
  let saved = localStorage.getItem('products');
  if(saved) {
    try {
      products = JSON.parse(saved);
    } catch(e) {
      console.log('Error loading products:', e);
    }
  }
  
  let savedCart = localStorage.getItem('cart');
  if(savedCart) {
    try {
      cart = JSON.parse(savedCart);
    } catch(e) {
      console.log('Error loading cart:', e);
    }
  }
  
  showProducts();
  showCart();
});

function show(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(page).classList.add('active');
}

function checkCode() {
  let code = document.getElementById('code').value;
  if(code === '5262104') {
    isLoggedIn = true;
    document.getElementById('login').style.display = 'none';
    document.getElementById('panel').style.display = 'block';
    showMyProducts();
  } else {
    alert('❌ קוד שגוי!');
  }
}

function logout() {
  isLoggedIn = false;
  document.getElementById('login').style.display = 'block';
  document.getElementById('panel').style.display = 'none';
  document.getElementById('code').value = '';
}

function addProduct() {
  if(!isLoggedIn) {
    alert('צריך להיות מחובר');
    return;
  }
  
  let name = document.getElementById('name').value.trim();
  let desc = document.getElementById('desc').value.trim();
  let price = document.getElementById('price').value.trim();
  let fileInput = document.getElementById('img');
  let file = fileInput.files[0];
  
  let msg = document.getElementById('message');
  msg.innerHTML = '';
  
  if(!name) {
    msg.innerHTML = '<div class="alert error">❌ הקלד שם מוצר!</div>';
    return;
  }
  if(!desc) {
    msg.innerHTML = '<div class="alert error">❌ הקלד תיאור!</div>';
    return;
  }
  if(!price) {
    msg.innerHTML = '<div class="alert error">❌ הקלד מחיר!</div>';
    return;
  }
  if(!file) {
    msg.innerHTML = '<div class="alert error">❌ בחר תמונה!</div>';
    return;
  }
  
  let reader = new FileReader();
  
  reader.onload = function(event) {
    let newProduct = {
      id: Date.now(),
      name: name,
      desc: desc,
      price: parseFloat(price),
      img: event.target.result
    };
    
    products.push(newProduct);
    localStorage.setItem('products', JSON.stringify(products));
    
    document.getElementById('name').value = '';
    document.getElementById('desc').value = '';
    document.getElementById('price').value = '';
    document.getElementById('img').value = '';
    
    msg.innerHTML = '<div class="alert success">✅ מוצר התווסף בהצלחה!</div>';
    
    showMyProducts();
    showProducts();
  };
  
  reader.onerror = function() {
    msg.innerHTML = '<div class="alert error">❌ שגיאה בקריאת התמונה</div>';
  };
  
  reader.readAsDataURL(file);
}

function deleteProduct(id) {
  if(!isLoggedIn) return;
  if(confirm('בטוח למחוק?')) {
    products = products.filter(p => p.id !== id);
    localStorage.setItem('products', JSON.stringify(products));
    showMyProducts();
    showProducts();
  }
}

function showMyProducts() {
  let html = '';
  if(products.length === 0) {
    html = '<p>אין מוצרים שלך</p>';
  } else {
    products.forEach(p => {
      html += '<div style="background:#111;padding:10px;margin:10px 0;border-radius:4px">';
      html += '<b>' + p.name + '</b> - ₪' + p.price.toFixed(2);
      html += ' <button class="btn" onclick="deleteProduct(' + p.id + ')" style="background:#f44;width:auto">מחק</button>';
      html += '</div>';
    });
  }
  document.getElementById('myProducts').innerHTML = html;
}

function showProducts() {
  let html = '';
  if(products.length === 0) {
    html = '<p>אין מוצרים עדיין</p>';
  } else {
    products.forEach(p => {
      html += '<div class="product-item">';
      html += '<h3>' + p.name + '</h3>';
      html += '<img src="' + p.img + '" alt="' + p.name + '">';
      html += '<p>' + p.desc + '</p>';
      html += '<p style="color:#ffc107;font-weight:bold;font-size:18px">₪' + p.price.toFixed(2) + '</p>';
      html += '<button class="btn" onclick="addToCart(' + p.id + ', \'' + p.name.replace(/'/g, "\\'") + '\', ' + p.price + ')">הוסף לעגלה</button>';
      html += '</div>';
    });
  }
  document.getElementById('productList').innerHTML = html;
}

function addToCart(id, name, price) {
  cart.push({id: id, name: name, price: price});
  localStorage.setItem('cart', JSON.stringify(cart));
  alert('✅ ' + name + ' הוסף לעגלה!');
  showCart();
}

function removeFromCart(index) {
  cart.splice(index, 1);
  localStorage.setItem('cart', JSON.stringify(cart));
  showCart();
}

function showCart() {
  let html = '';
  let total = 0;
  
  if(cart.length === 0) {
    html = '<p>העגלה ריקה</p>';
  } else {
    cart.forEach(function(item, index) {
      total += item.price;
      html += '<div class="product-item">';
      html += '<b>' + item.name + '</b> - ₪' + item.price.toFixed(2);
      html += ' <button class="btn" onclick="removeFromCart(' + index + ')" style="background:#f44;width:auto">הסר</button>';
      html += '</div>';
    });
    html += '<h3 style="color:#ffc107">סה"כ: ₪' + total.toFixed(2) + '</h3>';
    html += '<button class="btn" onclick="checkout()">הזמנה</button>';
  }
  
  document.getElementById('cartList').innerHTML = html;
}

function checkout() {
  if(cart.length === 0) {
    alert('העגלה ריקה');
    return;
  }
  
  let name = prompt('שם:');
  if(!name) return;
  let phone = prompt('טלפון:');
  if(!phone) return;
  
  let total = 0;
  let msg = '*הזמנה*\n';
  msg += 'שם: ' + name + '\n';
  msg += 'טלפון: ' + phone + '\n';
  msg += '---\n';
  
  cart.forEach(function(item) {
    total += item.price;
    msg += item.name + ' - ₪' + item.price.toFixed(2) + '\n';
  });
  
  msg += '---\n';
  msg += 'סה"כ: ₪' + total.toFixed(2);
  
  let url = 'https://wa.me/972533381681?text=' + encodeURIComponent(msg);
  window.open(url);
  
  alert('✅ ההזמנה נשלחה!');
  cart = [];
  localStorage.setItem('cart', JSON.stringify(cart));
  showCart();
}
</script>
</body>
</html>
