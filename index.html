<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>אמרי מלכת הסקוויש</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:Arial;padding:20px}
.header{background:#111;padding:20px;border-bottom:3px solid #ffc107;text-align:center}
h1{color:#ffc107;font-size:2em}
.nav button{background:#ffc107;color:#000;border:none;padding:15px;margin:5px;cursor:pointer;border-radius:4px}
.hidden{display:none}
.products{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:20px;margin:20px 0}
.card{background:#222;padding:15px;border-radius:8px}
.card h3{color:#ffc107}
.btn{background:#ffc107;color:#000;border:none;padding:10px;cursor:pointer;border-radius:4px;width:100%;margin-top:10px}
</style>
</head>
<body>
<div class="header"><h1>🛒 אמרי מלכת הסקוויש</h1></div>

<div class="nav">
<button onclick="showPage('catalog')">📦 קטלוג</button>
<button onclick="showPage('admin')">🔐 ניהול</button>
</div>

<div id="catalog" class="page">
<h2>קטלוג</h2>
<div id="products" class="products"></div>
</div>

<div id="admin" class="page hidden">
<h2>הוסף מוצר</h2>
<input type="password" id="code" placeholder="קוד">
<button onclick="checkCode()">כניסה</button>
<div id="admin-content" class="hidden">
<input type="text" id="name" placeholder="שם">
<input type="text" id="desc" placeholder="תיאור">
<input type="number" id="price" placeholder="מחיר">
<button onclick="addProduct()">הוסף</button>
<div id="list"></div>
</div>
</div>

<script>
let products = [];
const CODE = '5262104';

// טען מוצרים בעת טעינת הדף
window.addEventListener('load', function() {
  const saved = localStorage.getItem('products-list');
  if(saved) {
    try {
      products = JSON.parse(saved);
      renderProducts();
    } catch(e) {}
  }
});

function showPage(page) {
  document.getElementById('catalog').classList.add('hidden');
  document.getElementById('admin').classList.add('hidden');
  document.getElementById(page).classList.remove('hidden');
}

function checkCode() {
  const code = document.getElementById('code').value;
  if(code === CODE) {
    document.getElementById('admin-content').classList.remove('hidden');
    renderList();
  } else {
    alert('קוד שגוי');
  }
}

function addProduct() {
  const name = document.getElementById('name').value.trim();
  const desc = document.getElementById('desc').value.trim();
  const price = parseFloat(document.getElementById('price').value);
  
  if(!name || !desc || !price) {
    alert('מלא הכל');
    return;
  }
  
  products.push({
    id: Date.now(),
    name: name,
    desc: desc,
    price: price
  });
  
  localStorage.setItem('products-list', JSON.stringify(products));
  
  document.getElementById('name').value = '';
  document.getElementById('desc').value = '';
  document.getElementById('price').value = '';
  
  renderProducts();
  renderList();
  alert('✅');
}

function deleteProduct(id) {
  if(confirm('מחק?')) {
    products = products.filter(p => p.id !== id);
    localStorage.setItem('products-list', JSON.stringify(products));
    renderProducts();
    renderList();
  }
}

function renderProducts() {
  let html = '';
  products.forEach(p => {
    html += `<div class="card">
      <h3>${p.name}</h3>
      <p>${p.desc}</p>
      <p style="color:#ffc107;font-weight:bold">₪${p.price}</p>
    </div>`;
  });
  document.getElementById('products').innerHTML = html || 'אין מוצרים';
}

function renderList() {
  let html = '';
  products.forEach(p => {
    html += `<div style="background:#2a2a2a;padding:10px;margin:10px 0;display:flex;justify-content:space-between">
      <div><strong>${p.name}</strong> - ₪${p.price}</div>
      <button onclick="deleteProduct(${p.id})" style="background:#ff4444">מחק</button>
    </div>`;
  });
  document.getElementById('list').innerHTML = html || 'אין מוצרים';
}
</script>
</body>
</html>
