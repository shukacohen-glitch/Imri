<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ניהול מוצרים</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:Arial;padding:20px}
.header{background:#111;padding:20px;border-bottom:3px solid #ffc107;margin-bottom:20px;text-align:center}
h1{color:#ffc107}
.login-screen{display:flex;justify-content:center;align-items:center;min-height:80vh}
.login-box{background:#222;border:2px solid #ffc107;padding:40px;border-radius:8px;text-align:center;width:100%;max-width:400px}
.login-box h2{color:#ffc107;margin-bottom:20px;font-size:1.5em}
.login-box input{width:100%;padding:15px;margin:15px 0;background:#1a1a1a;border:2px solid #444;color:#fff;border-radius:4px;font-size:1.1em;text-align:center;letter-spacing:2px}
.login-box button{width:100%;background:#ffc107;color:#000;border:none;padding:15px;border-radius:4px;cursor:pointer;font-weight:bold;font-size:1.1em}
.login-box button:hover{background:#ffb300}
.error{color:#ff4444;margin:10px 0;font-weight:bold}
.tabs{display:flex;gap:10px;margin-bottom:20px}
.tab-btn{background:#ffc107;color:#000;border:none;padding:10px 20px;border-radius:4px;cursor:pointer;font-weight:bold}
.tab-btn.inactive{background:#444;color:#fff}
.content{background:#1a1a1a;padding:20px;border-radius:8px}
.content.hidden{display:none}
input,textarea{width:100%;padding:10px;margin:10px 0;background:#222;border:1px solid #444;color:#fff;border-radius:4px;font-family:Arial}
button.add-btn{background:#ffc107;color:#000;border:none;padding:10px 20px;border-radius:4px;cursor:pointer;font-weight:bold;width:100%;margin:10px 0}
button.add-btn:hover{background:#ffb300}
.product{background:#2a2a2a;padding:10px;margin:10px 0;border-radius:4px;display:flex;justify-content:space-between;align-items:center}
.delete-btn{background:#ff4444;color:#fff;padding:5px 10px;font-size:0.9em;border:none;border-radius:4px;cursor:pointer}
.delete-btn:hover{background:#cc0000}
.logout-btn{background:#666;color:#fff;padding:10px 20px;border:none;border-radius:4px;cursor:pointer;margin-top:20px}
.logout-btn:hover{background:#555}
</style>
</head>
<body>

<div class="header">
<h1>🛒 ניהול מוצרים</h1>
</div>

<div id="login-screen" class="login-screen">
<div class="login-box">
<h2>הכנס לממשק הניהול</h2>
<p style="margin-bottom:20px">הקלד את קוד הגישה</p>
<input type="password" id="code-input" placeholder="קוד גישה" onkeypress="if(event.key==='Enter') login()">
<p id="error-msg" class="error"></p>
<button onclick="login()">כניסה</button>
</div>
</div>

<div id="admin-screen" style="display:none">
<div class="tabs">
<button class="tab-btn" onclick="switchTab('catalog')">קטלוג</button>
<button class="tab-btn inactive" onclick="switchTab('admin')">ניהול</button>
<button class="tab-btn inactive" onclick="switchTab('cart')">עגלה</button>
</div>

<div id="catalog" class="content">
<h2>קטלוג מוצרים</h2>
<div id="catalog-list"></div>
</div>

<div id="admin" class="content hidden">
<h2>ניהול מוצרים</h2>

<h3 style="color:#ffc107;margin:20px 0">➕ הוסף מוצר חדש</h3>
<input type="text" id="prodName" placeholder="שם מוצר">
<textarea id="prodDesc" placeholder="תיאור" rows="3"></textarea>
<input type="number" id="prodPrice" placeholder="מחיר" step="0.01">
<button class="add-btn" onclick="addProduct()">הוסף מוצר</button>

<h3 style="color:#ffc107;margin:30px 0">📦 מוצרים קיימים</h3>
<div id="product-list"></div>
</div>

<div id="cart" class="content hidden">
<h2>🛒 עגלה</h2>
<div id="cart-list"></div>
<h3 style="margin-top:20px">סה"כ: <span id="total">0</span>₪</h3>
<button class="add-btn" onclick="checkout()">הזמנה</button>
</div>

<button class="logout-btn" onclick="logout()">🚪 התנתק</button>
</div>

<script>
const CORRECT_CODE = '5262104';
let products = JSON.parse(localStorage.getItem('myProducts')) || [];
let cart = [];
let isLoggedIn = false;

function login(){
  let code = document.getElementById('code-input').value.trim();
  
  if(code === CORRECT_CODE){
    isLoggedIn = true;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'block';
    loadCatalog();
  } else {
    document.getElementById('error-msg').textContent = '❌ קוד שגוי!';
    document.getElementById('code-input').value = '';
  }
}

function logout(){
  isLoggedIn = false;
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('admin-screen').style.display = 'none';
  document.getElementById('code-input').value = '';
  document.getElementById('error-msg').textContent = '';
}

function switchTab(tab){
  document.querySelectorAll('.content').forEach(c => c.classList.add('hidden'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.add('inactive'));
  document.getElementById(tab).classList.remove('hidden');
  event.target.classList.remove('inactive');
  
  if(tab === 'admin') loadProducts();
  if(tab === 'catalog') loadCatalog();
  if(tab === 'cart') loadCart();
}

function addProduct(){
  let name = document.getElementById('prodName').value.trim();
  let desc = document.getElementById('prodDesc').value.trim();
  let price = parseFloat(document.getElementById('prodPrice').value);
  
  if(!name || !desc || !price){
    alert('מלא את כל השדות!');
    return;
  }
  
  products.push({
    id: Date.now(),
    name: name,
    desc: desc,
    price: price
  });
  
  localStorage.setItem('myProducts', JSON.stringify(products));
  
  document.getElementById('prodName').value = '';
  document.getElementById('prodDesc').value = '';
  document.getElementById('prodPrice').value = '';
  
  loadProducts();
  loadCatalog();
  alert('��� מוצר נוסף!');
}

function deleteProduct(id){
  if(confirm('למחוק את המוצר?')){
    products = products.filter(p => p.id !== id);
    localStorage.setItem('myProducts', JSON.stringify(products));
    loadProducts();
    loadCatalog();
  }
}

function loadProducts(){
  let html = '';
  products.forEach(p => {
    html += `<div class="product">
      <div>
        <strong>${p.name}</strong><br>
        <span style="color:#ccc">${p.desc}</span><br>
        <span style="color:#ffc107">₪${p.price.toFixed(2)}</span>
      </div>
      <button class="delete-btn" onclick="deleteProduct(${p.id})">🗑️ מחק</button>
    </div>`;
  });
  document.getElementById('product-list').innerHTML = html || '<p style="color:#888">אין מוצרים</p>';
}

function loadCatalog(){
  let html = '';
  products.forEach(p => {
    html += `<div class="product">
      <div>
        <strong>${p.name}</strong><br>
        <span style="color:#ccc">${p.desc}</span><br>
        <span style="color:#ffc107">₪${p.price.toFixed(2)}</span>
      </div>
      <button class="add-btn" onclick="addToCart(${p.id}, '${p.name}', ${p.price})" style="width:auto;padding:10px 15px">הוסף לסל</button>
    </div>`;
  });
  document.getElementById('catalog-list').innerHTML = html || '<p style="color:#888">אין מוצרים</p>';
}

function addToCart(id, name, price){
  cart.push({id, name, price});
  alert('✅ ' + name + ' נוסף לסל');
}

function loadCart(){
  let html = '';
  let total = 0;
  cart.forEach((item, i) => {
    total += item.price;
    html += `<div class="product">
      <div>
        <strong>${item.name}</strong> - ₪${item.price.toFixed(2)}
      </div>
      <button class="delete-btn" onclick="cart.splice(${i},1); loadCart()">הסר</button>
    </div>`;
  });
  document.getElementById('cart-list').innerHTML = html || '<p style="color:#888">העגלה ריקה</p>';
  document.getElementById('total').textContent = total.toFixed(2);
}

function checkout(){
  if(cart.length === 0){
    alert('העגלה ריקה!');
    return;
  }
  let name = prompt('שם:');
  let phone = prompt('טלפון:');
  if(name && phone){
    let total = cart.reduce((sum, item) => sum + item.price, 0);
    alert('✅ הזמנתך התקבלה!\nשם: ' + name + '\nטלפון: ' + phone + '\nסה"כ: ₪' + total.toFixed(2));
    cart = [];
    loadCart();
  }
}
</script>

</body>
</html>
