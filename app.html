<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🛒 קטלוג מוצרים</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a1a;color:#fff;font-family:Arial;min-height:100vh}
.header{background:#222;padding:20px;text-align:center;border-bottom:3px solid #ffc107}
.header h1{color:#ffc107;font-size:2em;margin-bottom:15px}
.nav{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.nav button{background:#444;color:#fff;border:none;padding:12px 25px;cursor:pointer;border-radius:5px;font-weight:bold;font-size:1em}
.nav button.active{background:#ffc107;color:#000}
.content{max-width:1200px;margin:20px auto;padding:20px}
section{display:none}
section.active{display:block}
.form-group{margin:15px 0}
label{display:block;color:#ffc107;margin-bottom:8px;font-weight:bold}
input,textarea{width:100%;padding:12px;background:#2a2a2a;border:1px solid #444;color:#fff;border-radius:5px;font-family:Arial;margin-top:5px}
button.add{background:#ffc107;color:#000;padding:12px 30px;border:none;border-radius:5px;cursor:pointer;font-weight:bold;margin-top:10px;font-size:1em}
button.add:hover{background:#ffb300}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:20px;margin-top:20px}
.card{background:#2a2a2a;padding:15px;border-radius:8px;border:1px solid #444;text-align:center}
.card h3{color:#ffc107;margin:10px 0}
.card p{color:#ccc;margin:8px 0}
.price{font-size:1.5em;color:#ffc107;font-weight:bold;margin:10px 0}
button.small{background:#ffc107;color:#000;padding:8px 15px;border:none;border-radius:5px;cursor:pointer;font-weight:bold}
button.delete{background:#ff4444;color:#fff}
button.delete:hover{background:#cc0000}
.total{font-size:1.3em;color:#ffc107;font-weight:bold;margin:20px 0}
</style>
</head>
<body>

<div class="header">
<h1>🛒 קטלוג מוצרים</h1>
<div class="nav">
<button class="active" onclick="setTab('catalog')">📦 קטלוג</button>
<button onclick="setTab('admin')">⚙️ ניהול</button>
<button onclick="setTab('cart')">🛒 עגלה</button>
</div>
</div>

<div class="content">

<!-- CATALOG -->
<section id="catalog" class="active">
<h2>📦 מוצרים זמינים</h2>
<div class="grid" id="catalog-grid"></div>
</section>

<!-- ADMIN -->
<section id="admin">
<h2>⚙️ ניהול מוצרים</h2>
<div style="background:#2a2a2a;padding:20px;border-radius:8px;margin-bottom:20px;border:1px solid #444">
<h3 style="color:#ffc107">➕ הוסף מוצר חדש</h3>
<div class="form-group">
<label>שם המוצר:</label>
<input type="text" id="pname" placeholder="לדוגמה: חולצה לבנה">
</div>
<div class="form-group">
<label>תיאור:</label>
<textarea id="pdesc" placeholder="תיאור המוצר" rows="2"></textarea>
</div>
<div class="form-group">
<label>מחיר (₪):</label>
<input type="number" id="pprice" placeholder="99.99" min="0" step="0.01">
</div>
<button class="add" onclick="addProduct()">✅ הוסף מוצר</button>
</div>
<h3>📋 מוצרים קיימים:</h3>
<div id="admin-grid" class="grid"></div>
</section>

<!-- CART -->
<section id="cart">
<h2>🛒 עגלת קניות</h2>
<div id="cart-grid"></div>
<div class="total" id="cart-total">סה"כ: ₪0</div>
<button class="add" onclick="finalCheckout()">🚀 עבור להזמנה</button>
</section>

</div>

<script>
let products = JSON.parse(localStorage.getItem('products')) || [
  {id:1, name:'מוצר דוגמה', desc:'תיאור המוצר', price:99.99}
];
let cart = [];

function setTab(tab) {
  document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  event.target.classList.add('active');
  
  if(tab === 'catalog') renderCatalog();
  if(tab === 'admin') renderAdmin();
  if(tab === 'cart') renderCart();
}

function addProduct() {
  const name = document.getElementById('pname').value.trim();
  const desc = document.getElementById('pdesc').value.trim();
  const price = parseFloat(document.getElementById('pprice').value);
  
  if(!name || !desc || !price) { alert('מלא את כל השדות'); return; }
  
  products.push({id: Date.now(), name, desc, price});
  localStorage.setItem('products', JSON.stringify(products));
  
  document.getElementById('pname').value = '';
  document.getElementById('pdesc').value = '';
  document.getElementById('pprice').value = '';
  
  renderCatalog();
  renderAdmin();
  alert('✅ המוצר נוסף בהצלחה!');
}

function deleteProduct(id) {
  if(confirm('מחק את המוצר?')) {
    products = products.filter(p => p.id !== id);
    localStorage.setItem('products', JSON.stringify(products));
    renderCatalog();
    renderAdmin();
  }
}

function renderCatalog() {
  let html = '';
  products.forEach(p => {
    html += `
      <div class="card">
        <h3>${p.name}</h3>
        <p>${p.desc}</p>
        <p class="price">₪${p.price.toFixed(2)}</p>
        <button class="small" onclick="addToCart(${p.id}, '${p.name}', ${p.price})">הוסף לסל</button>
      </div>
    `;
  });
  document.getElementById('catalog-grid').innerHTML = html;
}

function renderAdmin() {
  let html = '';
  products.forEach(p => {
    html += `
      <div class="card">
        <h3>${p.name}</h3>
        <p>${p.desc}</p>
        <p class="price">₪${p.price.toFixed(2)}</p>
        <button class="small delete" onclick="deleteProduct(${p.id})">🗑️ מחק</button>
      </div>
    `;
  });
  document.getElementById('admin-grid').innerHTML = html;
}

function addToCart(id, name, price) {
  cart.push({id, name, price});
  alert('✅ ' + name + ' נוסף לסל!');
}

function renderCart() {
  let html = '';
  let total = 0;
  cart.forEach((item, i) => {
    total += item.price;
    html += `
      <div class="card">
        <h3>${item.name}</h3>
        <p class="price">₪${item.price.toFixed(2)}</p>
        <button class="small delete" onclick="removeFromCart(${i})">הסר</button>
      </div>
    `;
  });
  document.getElementById('cart-grid').innerHTML = html || '<p style="color:#888">העגלה ריקה</p>';
  document.getElementById('cart-total').textContent = 'סה"כ: ₪' + total.toFixed(2);
}

function removeFromCart(i) {
  cart.splice(i, 1);
  renderCart();
}

function finalCheckout() {
  if(cart.length === 0) { alert('העגלה ריקה!'); return; }
  const name = prompt('שם מלא:');
  const phone = prompt('טלפון:');
  if(name && phone) {
    const total = cart.reduce((s, item) => s + item.price, 0);
    alert('✅ תודה ' + name + '!\nהזמנתך התקבל��\nסה"כ: ₪' + total.toFixed(2) + '\nנוצור איתך קשר בטלפון: ' + phone);
    cart = [];
    renderCart();
  }
}

renderCatalog();
</script>

</body>
</html>
