<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>חנות</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:Arial}
.header{background:#111;padding:20px;text-align:center;border-bottom:3px solid #ffc107}
.header h1{color:#ffc107;margin-bottom:10px}
.nav{display:flex;gap:10px;justify-content:center}
.nav button{background:#ffc107;color:#000;border:none;padding:10px 20px;border-radius:4px;cursor:pointer;font-weight:bold}
.nav button.inactive{background:#444;color:#fff}
.container{max-width:1200px;margin:20px auto;padding:20px}
.tab{display:none}
.tab.active{display:block}
.code-box{background:#222;border:2px solid #ffc107;padding:15px;border-radius:8px;margin:20px 0;text-align:center}
.code-box h3{color:#ffc107;margin-bottom:10px}
.code-display{background:#1a1a1a;padding:15px;font-size:1.3em;color:#4ffc00;font-family:monospace;font-weight:bold;border-radius:4px;margin:10px 0}
.copy-btn{background:#4ffc00;color:#000;border:none;padding:10px 20px;border-radius:4px;cursor:pointer;font-weight:bold;margin-top:10px}
.copy-btn:hover{background:#33cc00}
</style>
</head>
<body>

<div class="header">
<h1>🛒 חנות</h1>
<div class="nav">
<button class="nav-btn" onclick="showTab('catalog')">קטלוג</button>
<button class="nav-btn inactive" onclick="showTab('admin')">ניהול</button>
<button class="nav-btn inactive" onclick="showTab('cart')">עגלה</button>
</div>
</div>

<div class="container">

<div id="catalog" class="tab active">
<h2>קטלוג מוצרים</h2>
<p>מוצרים יופיעו כאן</p>
</div>

<div id="admin" class="tab">
<h2>ניהול מוצרים</h2>

<div class="code-box">
<h3>📱 קוד גישה:</h3>
<div class="code-display">STORE-5262104</div>
<button class="copy-btn" onclick="copyCode()">📋 העתק</button>
</div>

<h3 style="color:#ffc107;margin-top:30px">הוסף מוצר:</h3>
<input type="text" placeholder="שם מוצר" style="width:100%;padding:10px;margin:10px 0;background:#222;border:1px solid #444;color:#fff;border-radius:4px">
<input type="text" placeholder="תיאור" style="width:100%;padding:10px;margin:10px 0;background:#222;border:1px solid #444;color:#fff;border-radius:4px">
<input type="number" placeholder="מחיר" style="width:100%;padding:10px;margin:10px 0;background:#222;border:1px solid #444;color:#fff;border-radius:4px">
<button style="background:#ffc107;color:#000;border:none;padding:10px 20px;border-radius:4px;cursor:pointer;font-weight:bold;width:100%">הוסף</button>
</div>

<div id="cart" class="tab">
<h2>עגלה</h2>
<p>העגלה ריקה</p>
</div>

</div>

<script>
function showTab(tabName){
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.add('inactive'));
  document.getElementById(tabName).classList.add('active');
  event.target.classList.remove('inactive');
}

function copyCode(){
  navigator.clipboard.writeText('STORE-5262104');
  alert('✅ קוד הועתק!');
}
</script>

</body>
</html>
