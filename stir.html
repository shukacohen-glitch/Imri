<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>אמרי מלכת הסקוויש</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#000;color:#fff;font-family:Arial;padding:20px}
.header{background:#111;padding:20px;border-bottom:3px solid #ffc107;margin-bottom:20px;text-align:center}h1{color:#ffc107;font-size:2em}
.main-nav{display:flex;gap:15px;justify-content:center;margin:20px 0}.main-nav button{background:#ffc107;color:#000;border:none;padding:15px 30px;border-radius:4px;cursor:pointer;font-weight:bold}
.container{max-width:1200px;margin:0 auto}.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:20px;margin:20px 0}
.product-card{background:#222;padding:15px;border-radius:8px;border:1px solid #444}
.product-image{width:100%;height:150px;background:#333;border-radius:4px;margin-bottom:10px}
.product-card h3{color:#ffc107}.btn{background:#ffc107;color:#000;border:none;padding:10px 15px;border-radius:4px;cursor:pointer}
</style>
</head>
<body>
<div class="header"><h1>🛒 אמרי</h1></div>
<div class="main-nav">
<button onclick="alert('עובד!')">בדיקה</button>
</div>
<div class="container">
<div id="content"></div>
</div>
<script>
alert('עמוד נטען!');
</script>
</body>
</html>
