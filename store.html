<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Online Shop</title>\n    <style>\n        body { font-family: Arial, sans-serif; }\n        .catalog { display: flex; flex-wrap: wrap; }\n        .product { width: 30%; margin: 1%; padding: 10px; border: 1px solid #ccc; }\n        .cart { position: fixed; top: 10px; right: 10px; }\n    </style>\n</head>\n<body>\n    <h1>Welcome to Our Online Shop</h1>\n    <div class="catalog">\n        <div class="product">\n            <h2>Product 1</h2>\n            <p>Description of Product 1.</p>\n            <button>Add to Cart</button>\n        </div>\n        <div class="product">\n            <h2>Product 2</h2>\n            <p>Description of Product 2.</p>\n            <button>Add to Cart</button>\n        </div>\n    </div>\n    <div class="cart">\n        <h2>Shopping Cart</h2>\n        <div id="cart-items">No items in cart</div>\n        <button>Checkout</button>\n    </div>\n    <script>\n        // Shopping cart logic here\n        const cartItems = [];\n        const cartDiv = document.getElementById('cart-items');\n        function addToCart(product) {\n            cartItems.push(product);\n            cartDiv.innerHTML = cartItems.join(', ');\n        }\n    </script>\n    <footer>\n        <p>Contact us on <a href="https://api.whatsapp.com/send?phone=YOUR_NUMBER">WhatsApp</a></p>\n    </footer>\n</body>\n</html>
