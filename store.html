<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>חנות מוצרים</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:Helvetica;line-height:1.6}
header{background:#111;padding:20px;border-bottom:3px solid #ffc107}
h1{color:#ffc107;text-align:center;font-size:2em;margin-bottom:10px}
.nav{display:flex;justify-content:center;gap:10px}
.btn{background:#ffc107;color:#000;border:none;padding:12px 24px;border-radius:4px;cursor:pointer;font-weight:bold;font-size:1em}
.btn:hover{background:#ffb300}
.btn.inactive{background:#444;color:#fff}
.container{max-width:1200px;margin:0 auto;padding:20px}
.section{display:none}
.section.active{display:block}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
.card{background:#1a1a1a;padding:15px;border-radius:8px;border:1px solid #333}
.card h3{color:#ffc107;font-size:1.3em;margin:10px 0}
.card p{color:#ccc;font-size:0.95em;margin:5px 0}
.price{color:#ffc107;font-size:1.5em;font-weight:bold;margin:10px 0}
input,textarea{width:100%;padding:10px;margin:8px 0;background:#222;border:1px solid #444;color:#fff;border-radius:4px;font-family:Arial}
.form-group{margin:15px 0}
label{display:block;color:#ffc107;font-weight:bold;margin-bottom:5px}
.btn-small{padding:6px 12px;font-size:0.9em}
.btn-del{background:#ff4444}
.btn-del:hover{background:#cc0000}
.cart-item{background:#222;padding:12px;margin:10px 0;border-radius:4px;display:flex;justify-content:space-between;align-items:center}
footer{background:#111;text-align:center;padding:20px;border-top:1px solid #333;color:#888}
</style>
</head>
<body>
<header>
<h1>🛒 חנות מוצרים</h1>
<div class="nav">
<button class="btn" onclick="tab('catalog')">קטלוג</button>
<button class="btn inactive" onclick="tab('admin')">ניהול</button>
<button class="btn inactive" onclick="tab('cart')">עגלה</button>
</div>
</header>

<div class="container">

<div id="catalog" class="section active">
<h2>מוצרים</h2>
<div class="grid" id="grid"></div>
</div>

<div id="admin" class="section">
<h2>ניהול מוצרים</h2>
<div class="form-group">
<label>שם המוצר:</label>
<input type="text" id="name" placeholder="">
<label>תיאור:</label>
<textarea id="desc" placeholder="" rows="3"></textarea>
<label>מחיר:</label>
<input type="number" id="price" placeholder="" step="0.01">
<button class="btn" onclick="add()">הוסף מוצר</button>
</div>
<h3>רשימת מוצרים:</h3>
<div id="list"></div>
</div>

<div id="cart" class="section">
<h2>עגלה</h2>
<div id="items"></div>
<h3 style="margin-top:20px">סה״כ: <span id="sum">0</span>₪</h3>
<button class="btn" onclick="order()">הזמנה</button>
</div>

</div>

<footer>© 2026 חנות מוצרים</footer>

<script>
let products = JSON.parse(localStorage.getItem('products')) || [{id:1,name:'מוצר 1',desc:'תיאור',price:99}];
let cart = [];

function tab(t){
  document.querySelectorAll('.section').forEach(e=>e.classList.remove('active'));
  document.getElementById(t).classList.add('active');
  document.querySelectorAll('.nav .btn').forEach(e=>e.classList.add('inactive'));
  event.target.classList.remove('inactive');
  if(t==='admin') show_admin();
  if(t==='catalog') show_catalog();
  if(t==='cart') show_cart();
}

function show_catalog(){
  let h = '';
  products.forEach(p=>{
    h += '<div class="card"><h3>'+p.name+'</h3><p>'+p.desc+'</p><p class="price">'+p.price+'₪</p><button class="btn btn-small" onclick="addcart('+p.id+',\''+p.name+'\','+p.price+')">הוסף לסל</button></div>';
  });
  document.getElementById('grid').innerHTML = h;
}

function show_admin(){
  let h = '';
  products.forEach(p=>{
    h += '<div class="card"><h3>'+p.name+'</h3><p>'+p.desc+'</p><p class="price">'+p.price+'₪</p><button class="btn btn-small btn-del" onclick="del('+p.id+')">מחק</button></div>';
  });
  document.getElementById('list').innerHTML = h;
}

function show_cart(){
  let h = '';
  let s = 0;
  cart.forEach((x,i)=>{
    s += x.price;
    h += '<div class="cart-item"><span>'+x.name+' - '+x.price+'₪</span><button class="btn btn-small btn-del" onclick="rmcart('+i+')">הסר</button></div>';
  });
  if(cart.length === 0) h = '<p style="color:#888">העגלה ריקה</p>';
  document.getElementById('items').innerHTML = h;
  document.getElementById('sum').textContent = s;
}

function add(){
  let n = document.getElementById('name').value.trim();
  let d = document.getElementById('desc').value.trim();
  let p = parseFloat(document.getElementById('price').value);
  if(!n || !d || !p){alert('מלא את כל השדות');return;}
  products.push({id:Date.now(),name:n,desc:d,price:p});
  localStorage.setItem('products',JSON.stringify(products));
  document.getElementById('name').value = '';
  document.getElementById('desc').value = '';
  document.getElementById('price').value = '';
  show_admin();
  show_catalog();
  alert('מוצר נוסף ✅');
}

function del(id){
  if(!confirm('למחוק?')) return;
  products = products.filter(p=>p.id!==id);
  localStorage.setItem('products',JSON.stringify(products));
  show_admin();
  show_catalog();
}

function addcart(id,name,price){
  cart.push({id,name,price});
  alert(name + ' נוסף לסל ✅');
}

function rmcart(i){
  cart.splice(i,1);
  show_cart();
}

function order(){
  if(cart.length===0){alert('העגלה ריקה');return;}
  let name = prompt('שם:');
  let phone = prompt('טלפון:');
  if(name && phone){
    let sum = cart.reduce((a,b)=>a+b.price,0);
    alert('הזמ��תך התקבלה ✅\nשם: '+name+'\nטלפון: '+phone+'\nסה"כ: '+sum+'₪\nנוצור איתך קשר בהקדם');
    cart = [];
    show_cart();
  }
}

show_catalog();
</script>
</body>
</html>
